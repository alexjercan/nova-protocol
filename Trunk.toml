[build]
public_url = "./"

[serve]
port = 8080

# Local mod-portal testing (dev only - proxies apply to `trunk serve`, never
# `trunk build`, so this has ZERO effect on the deployed site). It serves the
# generated portal SAME-ORIGIN under the trunk dev server, so the wasm Explore
# tab fetches `http://localhost:8080/mods/...` with no cross-origin `?portal=`
# override (which the browser blocks on CORS). Generate + serve the portal
# first, then `trunk serve` and open http://localhost:8080 with NO ?portal=:
#   cargo run -p nova_portal_gen -- --source webmods \
#     --shipped assets/mods.catalog.ron --out /tmp/portal/mods
#   python3 -m http.server -d /tmp/portal 8000
# See web/src/wiki/dev/mod-portal.md, "Local development".
[[proxy]]
backend = "http://localhost:8000/mods"
