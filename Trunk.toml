[build]
public_url = "./"

# After Trunk copies `assets/` into the staging dir, generate a default `.meta`
# sidecar for every asset that lacks one, so `AssetMetaCheck::Always` (see
# nova_core::assets_plugin) never has to fetch a missing meta on the web. Without
# this, `trunk serve` (and any SPA-fallback host) answers a missing `.meta` with
# `200 OK` + an HTML page, which Bevy tries to parse as RON and fails on, and the
# asset never loads. post_build runs against $TRUNK_STAGING_DIR BEFORE Trunk
# moves staging into dist/, and Trunk blocks on the hook, so the fresh sidecars
# ride along to dist. nova_meta_gen reads TRUNK_STAGING_DIR itself and writes into
# <staging>/assets. See the `asset-meta-always-web-cost` lesson in docs/LESSONS.md. (Cost: the
# native tool compiles Bevy once per fresh checkout; cached thereafter.)
[[hooks]]
stage = "post_build"
command = "cargo"
command_arguments = ["run", "--quiet", "-p", "nova_meta_gen"]

[serve]
port = 8080

# Local mod-portal testing (dev only - proxies apply to `trunk serve`, never
# `trunk build`, so this has ZERO effect on the deployed site). It serves the
# generated portal SAME-ORIGIN under the trunk dev server, so the wasm Explore
# tab fetches `http://localhost:8080/mods/...` with no cross-origin `?portal=`
# override (which the browser blocks on CORS). Generate + serve the portal
# first, then `trunk serve` and open http://localhost:8080 with NO ?portal=:
#   cargo run -p nova_portal_gen -- --source webmods \
#     --shipped assets/mods.catalog.ron --out /tmp/portal/mods
#   python3 -m http.server -d /tmp/portal 8000
# See web/src/wiki/dev/mod-portal.md, "Local development".
[[proxy]]
backend = "http://localhost:8000/mods"
