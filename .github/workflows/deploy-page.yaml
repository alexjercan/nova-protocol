name: deploy-github-page

on:
  workflow_dispatch:

permissions:
  contents: write

# Publishes a combined site to GitHub Pages:
#   /            -> the marketing/content site (web/, webpack) at the project
#                   pages subpath /nova-protocol/
#   /play/       -> the Bevy WASM game (Trunk, relative public_url so it is
#                   position-independent under the subpath)
#   /mods/       -> the static mod portal (nova_portal_gen: catalog.json +
#                   hashed, versioned copies of every webmods/ mod)
env:
  # Project pages are served from https://<user>.github.io/nova-protocol/, so the
  # webpack site needs its links/assets rooted at that subpath. The game keeps
  # Trunk's relative public_url ("./" in Trunk.toml), which resolves correctly
  # from /nova-protocol/play/ without baking the subpath in.
  PUBLIC_PATH: /nova-protocol/

jobs:
  build-web:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # --- landing/content site (web/) ---
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Build landing site
        working-directory: web
        run: |
          npm ci
          npm run build

      # --- Bevy WASM game ---
      - name: Install rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
      - name: Install Dependencies
        run: sudo apt-get update; sudo apt-get install pkg-config libx11-dev libasound2-dev libudev-dev libwayland-dev
      - name: Install trunk
        uses: jetli/trunk-action@v0.4.0
        with:
          version: 'latest'
      - name: Add wasm target
        run: |
          rustup target add wasm32-unknown-unknown
      # Generate the third-party dependency-license manifest into credits/ before
      # the Trunk build, so `copy-dir credits` bundles it into dist/ (and thus the
      # published /play/ site). Not committed - regenerated fresh each deploy.
      - name: Install cargo-about
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-about
      - name: Generate third-party license manifest
        run: cargo about generate about.hbs -o credits/THIRD-PARTY-LICENSES.md
      - name: Build game (release)
        run: |
          trunk build --release
      - name: Optimize Wasm
        uses: NiklasEi/wasm-opt-action@v2
        with:
          file: dist/*.wasm

      # --- assemble the combined site: landing at root, game under /play/ ---
      - name: Assemble site
        run: |
          rm -rf site
          mkdir -p site
          cp -r web/dist/. site/
          mkdir -p site/play
          cp -r dist/. site/play/
          # Serve the built files verbatim; do not let GitHub Pages run Jekyll
          # over them (harmless today, insurance against underscore paths later).
          touch site/.nojekyll

      # --- static mod portal: catalog.json + hashed file copies under /mods/ ---
      # nova_portal_gen is engine-free (no bevy), so this compiles in seconds;
      # it validates manifests and refuses ids that collide with the shipped
      # catalog. Deep content validation (do the bundles actually load?) is the
      # webmods_validation test on regular CI.
      - name: Generate mod portal
        run: |
          cargo run --release -p nova_portal_gen -- \
            --source webmods \
            --shipped assets/mods.catalog.ron \
            --out site/mods

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4.2.5
        with:
          branch: gh-pages
          folder: site
