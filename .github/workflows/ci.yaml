name: CI

on:
  push:
    branches: [master]
  pull_request:

# Cancel superseded runs on the same ref to save runner time.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: fmt / clippy / test
    runs-on: ubuntu-latest
    # examples_smoke launches real gameplay subprocesses with no internal
    # timeout; under lavapipe a wedged example would otherwise hang the runner
    # up to GitHub's 6h cap. Fail fast instead - a warm-cache run is well
    # under this; the budget exists for cold-cache runs, which pay one full
    # build of the tree on 2 cores.
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      # Two tiers of system deps. BUILD needs the ALSA + udev headers Bevy links
      # against, plus wayland/xkb headers a transitive dep's build script
      # pkg-configs even when nothing opens a window. RUNTIME is what sets this
      # repo apart from a compile-only CI: tests/examples_smoke.rs actually
      # LAUNCHES the harnessed examples (they use DefaultPlugins and open a real
      # window), so we also need a Vulkan loader plus mesa's software rasterizer
      # (lavapipe) to render with no GPU, and Xvfb to give winit an X display.
      # winit's X11 backend also dlopens libxkbcommon-x11.so.0 at runtime (the
      # -dev package only ships libxkbcommon.so), hence libxkbcommon-x11-0.
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --no-install-recommends -y \
            libasound2-dev libudev-dev libwayland-dev libxkbcommon-dev \
            libxkbcommon-x11-0 libvulkan1 mesa-vulkan-drivers xvfb

      # rust-toolchain.toml pins nightly with rustfmt + clippy; install it
      # explicitly so a toolchain problem surfaces here instead of being folded
      # into the first (slow) cargo invocation.
      - name: Install Rust nightly toolchain
        run: rustup toolchain install nightly --profile minimal -c rustfmt -c clippy

      # cache-on-failure matters here: while the smoke test was flaky every
      # run failed, the cache never saved, and every run paid a ~25 min cold
      # build - which is what blew the job timeout.
      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      # The suite documented in AGENTS.md ("Build, run, test"), run as CI is now
      # the source of truth for it.
      - name: Formatting
        run: cargo fmt --check

      # The local pre-commit fmt guard (.githooks/pre-commit) is what stops
      # drift from LANDING - CI's fmt step above is only advisory for a local
      # sprout-land + direct-push flow. This pins the guard itself so a broken
      # hook script surfaces here instead of silently letting drift through.
      - name: Fmt hook self-test
        run: scripts/test-fmt-hook.sh

      # One clippy pass, workspace-wide, with the debug feature on. `debug`
      # fans out to every crate's debug feature (nova_debug has none - it IS
      # the debug tooling - and cargo is fine with that), so this lints the
      # debug-gated code too. A second default-features pass would only add
      # coverage of `cfg(not(feature = "debug"))` branches (one trivial one
      # exists) and costs a near-full second check build on 2 cores.
      - name: Clippy
        run: cargo clippy --workspace --all-targets --features debug

      # Every crate's tests, with the same feature set the smoke examples use.
      # That feature match is the whole point: `debug` flips bevy/track_location,
      # so testing with default features and then running examples with
      # `--features debug` rebuilds Bevy and everything downstream a second
      # time - the other half of what blew the job timeout. This step also
      # builds the example binaries (cargo test builds examples), so the smoke
      # step below reuses them as-is. No DISPLAY is set here, so
      # tests/examples_smoke.rs skips itself loudly; this is the pure
      # unit/integration gate.
      - name: Tests
        run: cargo test --workspace --features debug

      # The windowed examples smoke test: spawns each harnessed example under
      # BCS_AUTOPILOT/Xvfb (lavapipe renders) and asserts it reaches gameplay,
      # passes its in-example behavior assertions, logs no command errors,
      # and exits without panic. BLOCKING again since 20260710-143138: the
      # taffy panic (resolve.rs unreachable, GitHub runners only) was
      # observed deterministically on the pre-rework 03_scenario and did not
      # survive the 20260712-211352 examples rework - the full reworked
      # suite ran green on ubuntu-latest (run 29283727248, 2026-07-13). If
      # it ever resurfaces, this step fails loudly with RUST_BACKTRACE=full
      # and the investigation record lives in tasks/20260710-143138/NOTES.md
      # ("The taffy panic").
      - name: Examples smoke test
        env:
          RUST_BACKTRACE: full
        # --features debug here too: the test binary links the nova-protocol
        # lib, and building it with default features would flip
        # bevy/track_location back off and rebuild Bevy inside this step.
        run: xvfb-run --auto-servernum cargo test -p nova-protocol --test examples_smoke --features debug

  # The dependency-license gate. The shipped manifest
  # (credits/THIRD-PARTY-LICENSES.md) is GENERATED at build/release time, not
  # committed (cargo-about's output is not byte-stable, so a committed copy could
  # not be diff-checked). This job just runs the generation and lets it fail:
  # cargo-about exits non-zero if any dependency carries a license outside
  # about.toml's accepted permissive set, so a new copyleft/unknown-license dep
  # is caught on the PR that adds it. No project build needed - cargo-about only
  # reads `cargo metadata` and crate license files - so this is fast and separate
  # from the compile/test gate above.
  licenses:
    name: dependency license gate
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      # The first cargo invocation auto-installs the rust-toolchain.toml-pinned
      # toolchain that cargo-about's `cargo metadata` runs under.
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-about
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-about
      # Generation fails on any non-accepted license - that failure IS the gate.
      # The output itself is discarded here; the shipped copy is generated in the
      # release/deploy workflows.
      - name: Check dependency licenses
        run: cargo about generate about.hbs -o "${RUNNER_TEMP}/third-party-licenses.md"
